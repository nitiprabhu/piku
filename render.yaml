services:
  # ── Backend API ────────────────────────────────────────────────────────────────
  - type: web
    name: reelcraft-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://reelcraft.onrender.com
      - key: BACKEND_URL
        value: https://reelcraft-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: reelcraft-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: reelcraft-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: reelcraft-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: MUAPI_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: INSTAGRAM_APP_ID
        value: "1542280374136345"
      - key: INSTAGRAM_APP_SECRET
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

  # ── RQ Worker ─────────────────────────────────────────────────────────────────
  - type: worker
    name: reelcraft-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    startCommand: python -m app.workers.worker_runner
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        fromService:
          name: reelcraft-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: reelcraft-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: reelcraft-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: reelcraft-redis
          type: redis
          property: connectionString
      - key: BACKEND_URL
        value: https://reelcraft-api.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: MUAPI_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

  # ── Frontend ───────────────────────────────────────────────────────────────────
  - type: web
    name: reelcraft
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://reelcraft-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_WS_URL
        value: wss://reelcraft-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false

databases:
  - name: reelcraft-db
    plan: starter
    databaseName: reelcraft
    user: reelcraft

  - name: reelcraft-redis
    type: redis
    plan: starter
    ipAllowList: []
